<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Wings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;}

nav{background:#111;border-bottom:2px solid #f5c518;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{width:48px;height:48px;object-fit:contain;border-radius:8px;background:#fff;padding:2px;}
.logo-txt{font-size:18px;font-weight:900;color:#f5c518;line-height:1.1;}
.logo-sub{font-size:10px;color:#aaa;display:block;font-style:italic;}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:all 0.2s;}
.btn-gold{background:#f5c518;color:#000;}
.btn-gold:hover{background:#e0b000;}
.btn-outline{background:transparent;color:#f5c518;border:2px solid #f5c518;}
.btn-outline:hover{background:#f5c518;color:#000;}
.btn-red{background:#e53e3e;color:#fff;border:none;}
.btn-red:hover{background:#c53030;}
.btn-green{background:#38a169;color:#fff;border:none;}
.cart-badge{background:#e53e3e;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-left:3px;}

.hero{background:linear-gradient(135deg,#1a0500,#2d0a00,#1a0a00);padding:24px 16px;text-align:center;border-bottom:3px solid #f5c518;}
.hero-logo{width:120px;height:120px;object-fit:contain;background:#fff;border-radius:16px;padding:6px;margin:0 auto 12px;display:block;box-shadow:0 0 24px rgba(245,197,24,0.4);}
.hero h1{font-size:30px;font-weight:900;color:#f5c518;line-height:1.1;text-shadow:0 0 20px rgba(245,197,24,0.3);}
.hero-tag{color:#ff6b35;font-size:13px;font-style:italic;margin:6px 0 12px;}
.pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.pill{background:rgba(245,197,24,0.12);border:1px solid #f5c518;color:#f5c518;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;}

.tabs{display:flex;gap:4px;margin-bottom:18px;background:#111;padding:4px;border-radius:10px;flex-wrap:wrap;}
.tab{flex:1;min-width:80px;padding:8px 4px;border:none;background:none;color:#888;font-weight:700;font-size:12px;cursor:pointer;border-radius:7px;transition:all 0.2s;}
.tab.active{background:#f5c518;color:#000;}

.section{padding:20px 14px;max-width:900px;margin:0 auto;}
.sec-title{font-size:17px;font-weight:800;color:#f5c518;margin-bottom:14px;display:flex;align-items:center;gap:6px;border-bottom:2px solid #222;padding-bottom:8px;}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}
.menu-card{background:#1a1a1a;border:1px solid #333;border-radius:12px;overflow:hidden;transition:transform 0.2s,border-color 0.2s;cursor:pointer;}
.menu-card:hover{transform:translateY(-3px);border-color:#f5c518;}
.menu-card-img{width:100%;height:130px;background:#222;display:flex;align-items:center;justify-content:center;font-size:44px;overflow:hidden;}
.menu-card-img img{width:100%;height:100%;object-fit:cover;}
.menu-card-body{padding:12px;}
.menu-card-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px;}
.menu-card-desc{font-size:11px;color:#999;margin-bottom:8px;line-height:1.4;}
.menu-card-bottom{display:flex;align-items:center;justify-content:space-between;}
.price{font-size:18px;font-weight:900;color:#f5c518;}
.badge{background:#e53e3e;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;}
.badge-new{background:#38a169;}
.badge-party{background:#805ad5;}

.flavor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;}
.flavor-chip{background:#222;border:1px solid #444;border-radius:8px;padding:7px 8px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;text-align:center;}
.flavor-chip:hover,.flavor-chip.selected{background:#f5c518;color:#000;border-color:#f5c518;}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px;}
.modal{background:#1a1a1a;border:2px solid #f5c518;border-radius:16px;padding:20px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h2{color:#f5c518;font-size:18px;margin-bottom:12px;}
.modal-close{float:right;background:none;border:none;color:#aaa;font-size:22px;cursor:pointer;line-height:1;}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:700;color:#f5c518;margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:#111;border:1px solid #444;border-radius:8px;color:#fff;padding:9px 12px;font-size:13px;outline:none;transition:border-color 0.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#f5c518;}
.form-group select option{background:#111;}

.cart-items{background:#111;border-radius:10px;padding:12px;margin-bottom:14px;}
.cart-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #222;font-size:12px;}
.cart-item:last-child{border-bottom:none;}
.cart-item-name{color:#fff;font-weight:700;flex:1;}
.cart-item-detail{color:#777;font-size:10px;margin-top:2px;}
.cart-item-price{color:#f5c518;font-weight:700;white-space:nowrap;margin-left:8px;}
.remove-btn{background:none;border:none;color:#e53e3e;cursor:pointer;font-size:14px;padding:2px 5px;}
.cart-total{font-size:17px;font-weight:800;color:#f5c518;text-align:right;margin-bottom:14px;}
.empty-cart{text-align:center;color:#555;padding:20px;font-size:13px;}

.order-form{background:#1a1a1a;border:2px solid #f5c518;border-radius:14px;padding:20px;}

.login-box{max-width:380px;margin:40px auto;background:#1a1a1a;border:2px solid #f5c518;border-radius:16px;padding:28px;text-align:center;}
.login-box h2{color:#f5c518;font-size:22px;margin-bottom:6px;}
.login-box p{color:#aaa;font-size:12px;margin-bottom:20px;}

.receipt{background:#fff;color:#111;border-radius:12px;padding:20px;max-width:380px;margin:0 auto;font-family:'Courier New',monospace;}
.receipt-logo{width:70px;height:70px;object-fit:contain;display:block;margin:0 auto 8px;border-radius:8px;}
.receipt-title{text-align:center;font-size:18px;font-weight:900;color:#b8860b;margin-bottom:2px;}
.receipt-sub{text-align:center;font-size:10px;color:#555;margin-bottom:12px;}
.receipt-divider{border:none;border-top:1px dashed #999;margin:10px 0;}
.receipt-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
.receipt-row.total{font-weight:900;font-size:14px;border-top:2px solid #111;padding-top:6px;margin-top:4px;}
.receipt-item{margin-bottom:6px;}
.receipt-item-name{font-weight:700;font-size:12px;}
.receipt-item-detail{font-size:10px;color:#555;}
.receipt-footer{text-align:center;font-size:10px;color:#555;margin-top:10px;line-height:1.6;}

.success-box{text-align:center;padding:24px;background:#0d1a0d;border:2px solid #38a169;border-radius:16px;margin:16px 0;}
.success-box h2{color:#38a169;font-size:22px;margin-bottom:6px;}

.admin-panel{background:#111;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:14px;}
.order-ticket{background:#1a1a1a;border:1px solid #f5c518;border-radius:10px;padding:12px;margin-bottom:10px;}
.order-ticket-header{display:flex;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.order-status{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.status-new{background:#e53e3e;color:#fff;}
.status-pending_payment{background:#d69e2e;color:#000;}
.status-preparing{background:#f5c518;color:#000;}
.status-ready{background:#38a169;color:#fff;}
.status-done{background:#555;color:#aaa;}

.info-banner{background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:8px;padding:9px 12px;font-size:11px;color:#f5c518;margin-bottom:14px;line-height:1.5;}

.gcash-box{background:#0d0d1f;border:2px solid #4299e1;border-radius:14px;padding:20px;text-align:center;}
.gcash-qr{width:220px;height:auto;border-radius:12px;margin:14px auto;display:block;border:3px solid #fff;}

.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.gallery-item{border-radius:10px;overflow:hidden;height:160px;background:#222;border:1px solid #333;}
.gallery-item img{width:100%;height:100%;object-fit:cover;}

.chat-box{background:#111;border:1px solid #333;border-radius:12px;display:flex;flex-direction:column;height:60vh;max-height:520px;}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.chat-bubble{max-width:75%;padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.4;word-wrap:break-word;}
.chat-bubble-customer{align-self:flex-end;background:#f5c518;color:#000;border-bottom-right-radius:3px;}
.chat-bubble-admin{align-self:flex-start;background:#222;color:#fff;border-bottom-left-radius:3px;}
.chat-bubble-time{font-size:9px;opacity:0.6;margin-top:3px;}
.chat-input-row{display:flex;gap:8px;padding:10px;border-top:1px solid #333;}
.chat-input-row input{flex:1;background:#1a1a1a;border:1px solid #444;border-radius:20px;padding:9px 14px;color:#fff;font-size:13px;outline:none;}
.chat-input-row input:focus{border-color:#f5c518;}
.chat-empty{color:#555;text-align:center;margin:auto;font-size:12px;}
.thread-item{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.thread-item:hover,.thread-item.active{border-color:#f5c518;}
.thread-item-unread{border-color:#e53e3e;}

@media(max-width:500px){
  .menu-grid{grid-template-columns:1fr 1fr;}
  .menu-card-img{height:100px;}
  .hero h1{font-size:24px;}
  .gcash-qr{width:180px;}
}
</style>
</head>

function computeDeliveryFee(barangayName){
  const b = BARANGAYS.find(x=>x.name===barangayName);
  if(!b || b.km===null) return null; // unknown/island barangay - needs manual quote
  if(b.km<=1) return FIRST_KM_FEE;
  return FIRST_KM_FEE + (b.km-1)*ADDITIONAL_KM_FEE;
}

// ===== CLOUD DATABASE (Firebase Realtime Database) =====
// Para makita sa Admin (anumang device) ang mga order na placed sa customer device,
// kailangan ng cloud database. Sundin ang steps na ito (libre, 5 minuto lang):
// 1. Pumunta sa https://console.firebase.google.com -> Add Project (libre)
// 2. Sa loob ng project, pumunta sa "Build > Realtime Database" -> Create Database
//    -> piliin ang location -> Start in TEST MODE (para gumana agad)
// 3. Kunin ang Database URL (parang https://your-project-default-rtdb.asia-southeast1.firebasedatabase.app)
// 4. I-paste sa ibaba sa FIREBASE_DB_URL
const FIREBASE_DB_URL = 'https://disneywings-default-rtdb.asia-southeast1.firebasedatabase.app'; // connected ✅

async function loadOrders(){
  if(!FIREBASE_DB_URL) return MEMORY_ORDERS;
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/orders.json`);
    const data = await res.json();
    return data ? Object.values(data) : [];
  }catch(e){ console.error('loadOrders error',e); return MEMORY_ORDERS; }
}
async function saveOrder(order){
  MEMORY_ORDERS.push(order); // local fallback/cache
  if(!FIREBASE_DB_URL) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/orders/${order.orderNum}.json`,{
      method:'PUT', body: JSON.stringify(order)
    });
  }catch(e){ console.error('saveOrder error',e); }
}
async function updateOrderField(orderNum, fields){
  if(!FIREBASE_DB_URL) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/orders/${orderNum}.json`,{
      method:'PATCH', body: JSON.stringify(fields)
    });
  }catch(e){ console.error('updateOrderField error',e); }
}
async function loadUsers(){
  if(!FIREBASE_DB_URL) return MEMORY_USERS;
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/users.json`);
    const data = await res.json();
    return data || {};
  }catch(e){ console.error('loadUsers error',e); return MEMORY_USERS; }
}
// Normalizes a user record so old (plain string password) and new (object) formats both work.
function getUserPassword(entry){
  return typeof entry === 'string' ? entry : (entry ? entry.password : undefined);
}
async function saveUser(username,password){
  const record = { password, createdAt: Date.now(), lastLogin: Date.now() };
  MEMORY_USERS[username]=record; // local fallback/cache
  if(!FIREBASE_DB_URL) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/users/${username}.json`,{
      method:'PUT', body: JSON.stringify(record)
    });
  }catch(e){ console.error('saveUser error',e); }
}
async function touchUserLogin(username){
  if(!FIREBASE_DB_URL) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/users/${username}.json`,{
      method:'PATCH', body: JSON.stringify({lastLogin: Date.now()})
    });
  }catch(e){ console.error('touchUserLogin error',e); }
}
// VISIT TRACKING — logs once per browser tab/session (not on every click) so the
// admin can see how many people opened the site, logged in or not.
async function logVisit(){
  if(sessionStorage.getItem('dw_visit_logged')) return;
  sessionStorage.setItem('dw_visit_logged','1');
  if(!FIREBASE_DB_URL) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/visits.json`,{
      method:'POST', body: JSON.stringify({ timestamp: Date.now(), username: state.user || 'Guest' })
    });
  }catch(e){ console.error('logVisit error',e); }
}
async function loadVisits(){
  if(!FIREBASE_DB_URL) return [];
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/visits.json`);
    const data = await res.json();
    return data ? Object.values(data) : [];
  }catch(e){ console.error('loadVisits error',e); return []; }
}
// CHAT — messages are grouped per customer username: messages/{username}/{pushId}
// Polled every few seconds (not true websockets) to simulate real-time updates.
async function loadMessages(username){
  if(!FIREBASE_DB_URL) return [];
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/messages/${username}.json`);
    const data = await res.json();
    return data ? Object.values(data).sort((a,b)=>a.timestamp-b.timestamp) : [];
  }catch(e){ console.error('loadMessages error',e); return []; }
}
async function loadAllThreads(){
  if(!FIREBASE_DB_URL) return [];
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/messages.json`);
    const data = await res.json();
    if(!data) return [];
    return Object.entries(data).map(([username,msgsObj])=>{
      const msgs = Object.values(msgsObj).sort((a,b)=>a.timestamp-b.timestamp);
      const last = msgs[msgs.length-1];
      const unread = msgs.some(m=>m.sender==='customer' && !m.readByAdmin);
      return { username, lastText: last?last.text:'', lastTimestamp: last?last.timestamp:0, unread };
    }).sort((a,b)=>b.lastTimestamp-a.lastTimestamp);
  }catch(e){ console.error('loadAllThreads error',e); return []; }
}
async function sendMessage(username, sender, text){
  if(!FIREBASE_DB_URL || !text || !text.trim()) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/messages/${username}.json`,{
      method:'POST',
      body: JSON.stringify({ sender, text: text.trim(), timestamp: Date.now(), readByAdmin: sender==='admin' })
    });
  }catch(e){ console.error('sendMessage error',e); }
}
async function markThreadReadByAdmin(username){
  if(!FIREBASE_DB_URL) return;
  try{
    const res = await fetch(`${FIREBASE_DB_URL}/messages/${username}.json`);
    const data = await res.json();
    if(!data) return;
    const updates = {};
    Object.entries(data).forEach(([id,m])=>{ if(m.sender==='customer'&&!m.readByAdmin) updates[id]={...m, readByAdmin:true}; });
    if(Object.keys(updates).length){
      await fetch(`${FIREBASE_DB_URL}/messages/${username}.json`,{ method:'PATCH', body: JSON.stringify(updates) });
    }
  }catch(e){ console.error('markThreadReadByAdmin error',e); }
}

function stopAdminChatPolling(){
  if(state.adminChatPollHandle){ clearInterval(state.adminChatPollHandle); state.adminChatPollHandle=null; }
}
async function openAdminChat(username){
  stopAdminChatPolling();
  state.adminChatUser = username;
  state.adminChatMessages = await loadMessages(username);
  render();
  markThreadReadByAdmin(username);
  const refresh = async ()=>{
    const msgs = await loadMessages(username);
    state.adminChatMessages = msgs;
    if(state.adminChatUser===username && state.adminTab==='messages'){
      render();
      const box = document.getElementById('admin-chat-scroll');
      if(box) box.scrollTop = box.scrollHeight;
      markThreadReadByAdmin(username);
    }
  };
  state.adminChatPollHandle = setInterval(refresh, 4000);
}
function closeAdminChat(){
  stopAdminChatPolling();
  state.adminChatUser = null;
  state.adminChatMessages = [];
  render();
  loadAllThreads().then(threads=>{ state.chatThreads=threads; if(state.adminTab==='messages'&&!state.adminChatUser) render(); });
}
async function sendAdminReply(){
  const input = document.getElementById('admin-chat-input');
  const text = input.value;
  if(!text || !text.trim() || !state.adminChatUser) return;
  input.value='';
  await sendMessage(state.adminChatUser, 'admin', text);
  state.adminChatMessages = await loadMessages(state.adminChatUser);
  render();
  const box = document.getElementById('admin-chat-scroll');
  if(box) box.scrollTop = box.scrollHeight;
}
function onBarangayChange(){
  const sel = document.getElementById('f-barangay');
  const barangay = sel.value;
  const subtotal = state.cart.reduce((a,i)=>a+i.price,0);
  const feeEl = document.getElementById('fee-delivery');
  const totalEl = document.getElementById('fee-total');
  if(!barangay){
    feeEl.textContent = 'Piliin ang barangay';
    feeEl.style.color = '#aaa';
    totalEl.textContent = '₱'+subtotal.toLocaleString();
    state.deliveryFee = null;
    return;
  }
  const fee = computeDeliveryFee(barangay);
  if(fee === null){
    feeEl.textContent = 'Tatawagan ka namin para sa quote';
    feeEl.style.color = '#f5c518';
    totalEl.textContent = '₱'+subtotal.toLocaleString()+' + TBD';
    state.deliveryFee = null;
  } else {
    feeEl.textContent = '₱'+fee.toLocaleString();
    feeEl.style.color = '#f5c518';
    totalEl.textContent = '₱'+(subtotal+fee).toLocaleString();
    state.deliveryFee = fee;
  }
}

function setTab(t){
  stopChatPolling();

function stopChatPolling(){

}
function startChatPolling(){
  if(!state.user || state.isAdmin) return;
  const refresh = async ()=>{
    const msgs = await loadMessages(state.user);
    state.chatMessages = msgs;
    if(state.activeTab==='chat'){
      render();
      const box = document.getElementById('chat-scroll');
      if(box) box.scrollTop = box.scrollHeight;
    }
  };
  refresh();
  state.chatPollHandle = setInterval(refresh, 4000);
}

function toggleFlavor(f,max){
  const fl=state.modal.selectedFlavors;
  if(fl.includes(f)){state.modal.selectedFlavors=fl.filter(x=>x!==f);}
  else if(fl.length<max){state.modal.selectedFlavors=[...fl,f];}
  render();
}
function addToCart(itemId){
  const item=MENU.find(m=>m.id===itemId);
  if(item.flavors>0&&state.modal.selectedFlavors.length<item.flavors){
    alert(`Pumili ng ${item.flavors} flavor${item.flavors>1?'s':''}!`);return;
  }
  state.cart.push({id:Date.now(),name:item.name,option:item.options[0].label,price:item.options[0].price,flavors:[...(state.modal.selectedFlavors||[])]});
  state.modal=null;
  render();
  alert('✅ Nadagdag sa cart!');
}
function removeCart(idx){state.cart.splice(idx,1);render();}

function nextOrderNum(){
  const n = state.orders.length + 1;
  return String(n).padStart(4,'0');
}

// Counts how many DAYS this username has ordered on (1 stamp per day, regardless
// of how many orders are placed that same day), returning
// {countSoFar, stampInCycle, rewardEarned} as of and including the day of the given orderNum.
function getLoyaltyInfo(username, orderNum){
  if(!username || username==='Guest') return null;
  const userOrders = state.orders
    .filter(o=>o.username===username)
    .sort((a,b)=>a.timestamp-b.timestamp);
  const order = userOrders.find(o=>o.orderNum===orderNum);
  if(!order) return null;
  // Build list of unique order-days in chronological order (1 stamp per day)
  const uniqueDays = [];
  userOrders.forEach(o=>{
    const d = new Date(o.timestamp).toDateString();
    if(!uniqueDays.includes(d)) uniqueDays.push(d);
  });
  const orderDay = new Date(order.timestamp).toDateString();
  const countSoFar = uniqueDays.indexOf(orderDay)+1;
  const stampInCycle = ((countSoFar-1)%10)+1; // 1-10
  const rewardEarned = countSoFar>0 && countSoFar%10===0;
  return {countSoFar, stampInCycle, rewardEarned};
}

async function submitOrder(){
  const nm=document.getElementById('f-name')?.value.trim();
  const barangay=document.getElementById('f-barangay')?.value;
  const lc=document.getElementById('f-location')?.value.trim();
  const lm=document.getElementById('f-landmark')?.value.trim();
  const cp=document.getElementById('f-cp')?.value.trim();
  const pay=document.getElementById('f-pay')?.value||'Cash on Delivery';
  if(!nm||!barangay||!lc||!lm||!cp){alert('Punan ang lahat ng fields, kasama ang Barangay!');return;}
  const deliveryFee = computeDeliveryFee(barangay);
  if(deliveryFee===null){
    alert('Para sa barangay na ito, tatawagan ka muna namin para sa delivery fee bago ma-confirm ang order. I-message mo na lang kami sa Facebook Page: Disney Wing\'s, o tawagan ang 09302979452.');
    return;
  }
  // Refresh latest orders from cloud so order numbers + loyalty counts are accurate across devices
  state.orders = await loadOrders();
  const subtotal=state.cart.reduce((a,i)=>a+i.price,0);
  const total=subtotal+deliveryFee;
  const orderDraft={
    orderNum: nextOrderNum(),
    username: state.user||'Guest',
    name:nm,barangay,location:lc,landmark:lm,cp,payment:pay,
    items:[...state.cart],subtotal,deliveryFee,total,
    timestamp: Date.now()
  };

  if(pay === 'GCash'){
    // Require payment confirmation before receipt
    orderDraft.status = 'pending_payment';
    state.pendingOrder = orderDraft;
    state.page = 'gcash';
    render();
    return;
  }

  // COD / Pickup - place order immediately
  orderDraft.status = 'new';
  await finalizeOrder(orderDraft);
}

async function finalizeOrder(orderDraft){
  state.orders.push(orderDraft);
  await saveOrder(orderDraft);
  state.receipt = orderDraft;
  state.orderSuccess = true;
  state.cart = [];
  state.pendingOrder = null;
  state.page = 'cart';
  render();
}

function onProofUpload(){
  const fileInput = document.getElementById('f-proof');
  const file = fileInput.files[0];
  const btn = document.getElementById('btn-confirm-gcash');
  const preview = document.getElementById('proof-preview');
  if(!file){
    state.proofOfPayment = null;
    btn.disabled = true; btn.style.opacity='0.5'; btn.style.cursor='not-allowed';
    preview.innerHTML='';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    state.proofOfPayment = e.target.result;
    preview.innerHTML = `<img src="${e.target.result}" style="max-width:160px;border-radius:8px;border:2px solid #38a169;">`;
    btn.disabled = false; btn.style.opacity='1'; btn.style.cursor='pointer';
  };
  reader.readAsDataURL(file);
}

async function confirmGcashPayment(){
  if(!state.pendingOrder) return;
  if(!state.proofOfPayment){
    alert('I-upload muna ang screenshot ng proof of payment bago ma-confirm ang order.');
    return;
  }
  const order = {...state.pendingOrder, status:'new', proofOfPayment: state.proofOfPayment};
  state.proofOfPayment = null;
  await finalizeOrder(order);
}

function cancelGcashOrder(){
  state.pendingOrder = null;
  state.proofOfPayment = null;
  state.page = 'cart';
  render();
}

function resetOrder(){state.orderSuccess=false;state.receipt=null;state.page='home';render();}
function viewReceipt(orderNum){
  const o = state.orders.find(x=>x.orderNum===orderNum);
  if(o){ state.receipt=o; state.page='receipt'; render(); }
}
async function setStatus(orderNum,status){
  const o = state.orders.find(x=>x.orderNum===orderNum);
  if(o){ o.status=status; await updateOrderField(orderNum,{status}); render(); }
}

async function doLogin(){
  const u=document.getElementById('li-u').value.trim();
  const p=document.getElementById('li-p').value.trim();
  if(!u||!p){document.getElementById('li-err').textContent='Punan ang username at password.';return;}
  if(u===ADMIN.user&&p===ADMIN.pass){state.loggedIn=true;state.isAdmin=true;state.user='Admin';state.page='home';render();return;}
  const users = await loadUsers();
  if(users[u]&&getUserPassword(users[u])===p){
    state.loggedIn=true;state.isAdmin=false;state.user=u;state.page='home';render();
    touchUserLogin(u);
  }
  else{document.getElementById('li-err').textContent='Mali ang username o password.';}
}
async function doSignup(){
  const u=document.getElementById('li-u').value.trim();
  const p=document.getElementById('li-p').value.trim();
  if(!u||!p){document.getElementById('li-err').textContent='Punan ang lahat ng fields.';return;}
  const users = await loadUsers();
  if(users[u]){document.getElementById('li-err').textContent='Gamit na ang username na iyan.';return;}
  await saveUser(u,p);
  state.loggedIn=true;state.isAdmin=false;state.user=u;state.page='home';render();
}

render();
(async function initApp(){
  state.orders = await loadOrders();
  if(state.page==='admin') render();
  logVisit();
})();
